events {}

http {
  access_log off;
  error_log /var/log/nginx/error.log error;

  resolver 127.0.0.11 valid=10s ipv6=off;

  # ---------------- UPSTREAMS ----------------
  upstream grafana_upstream {
    server grafana:3000;
  }

  upstream wearable_app_frontend_upstream {
    server wearable-app-frontend:9055;
  }

  upstream wearable_app_backend_upstream {
    server wearable-app-backend:9012;
  }

  upstream config_upstream {
    server config:9040;
  }

  upstream admin_upstream {
    server user_management:9033;
  }

  # ---------------- HTTP → HTTPS ----------------
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ================= GRAFANA =================
  server {
    listen 443 ssl;
    server_name destro-grafana.destroai.com;
    ssl_certificate /etc/nginx/certs/live/destroai.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/destroai.com/privkey.pem;

    location / {
      proxy_pass http://grafana_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ================= WEARABLE APP =================
  server {
    listen 443 ssl;
    server_name destro-wearable-app.destroai.com;

    ssl_certificate /etc/nginx/certs/live/destroai.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/destroai.com/privkey.pem;

    # API + WebSocket — routed directly to backend
    location /api/ {
      proxy_pass http://wearable_app_backend_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # React SPA — static files served by frontend container
    location / {
      proxy_pass http://wearable_app_frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ================= CONFIG =================
  server {
    listen 443 ssl;
    server_name destro-config.destroai.com;

    ssl_certificate /etc/nginx/certs/live/destroai.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/destroai.com/privkey.pem;

    location / {
      proxy_pass http://config_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ================= ADMIN =================
  server {
    listen 443 ssl;
    server_name destro-admin.destroai.com;

    ssl_certificate /etc/nginx/certs/live/destroai.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/destroai.com/privkey.pem;

    location / {
      proxy_pass http://admin_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}